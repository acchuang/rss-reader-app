name: Refresh RSS Sources

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RSS_API_BASE_URL: ${{ vars.RSS_API_BASE_URL || 'https://api-production-c2fc.up.railway.app' }}
      RSS_USER_ID: ${{ secrets.RSS_USER_ID }}
      RSS_REFRESH_CONCURRENCY: '6'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh all sources
        run: node .github/scripts/refresh-all-feeds.mjs
